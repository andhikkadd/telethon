{% extends "base.html" %}

{% block title %}Login - Userbot Control Panel{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card text-center glow-on-hover">
            <div class="mb-4">
                <i class="bi bi-robot spin-slow text-primary" style="font-size: 3rem;"></i>
                <h3 class="mt-3 fw-bold">Admin Portal</h3>
                <p class="text-secondary text-muted">Telegram Userbot Framework</p>
            </div>
            
            <form action="/login" method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="mb-3 text-start">
                    <label for="username" class="form-label text-secondary fw-semibold">Username</label>
                    <input type="text" class="form-control form-control-custom" id="username" name="username" placeholder="Enter admin username" required autofocus>
                </div>
                <div class="mb-4 text-start">
                    <label for="password" class="form-label text-secondary fw-semibold">Password</label>
                    <input type="password" class="form-control form-control-custom" id="password" name="password" placeholder="Enter secure password" required>
                </div>
                
                <button type="submit" class="btn btn-custom btn-accent w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
